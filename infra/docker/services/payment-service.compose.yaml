services:
  payment-service-db:
    image: postgres:16-alpine
    container_name: payment-service-db
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432"

  payment-service:
    image: edoc/payment-service:latest
    container_name: payment-service
    depends_on:
      - payment-service-db
    ports:
      - "8085:8085"

