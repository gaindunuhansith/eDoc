services:
  telemedicine-service-db:
    image: postgres:16-alpine
    container_name: telemedicine-service-db
    environment:
      POSTGRES_DB: telemedicine_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432"

  telemedicine-service:
    image: edoc/telemedicine-service:latest
    container_name: telemedicine-service
    depends_on:
      - telemedicine-service-db
    ports:
      - "8086:8086"

