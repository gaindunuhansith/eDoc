services:
  api-gateway-db:
    image: postgres:16-alpine
    container_name: api-gateway-db
    environment:
      POSTGRES_DB: api_gateway_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432"

  api-gateway:
    image: edoc/api-gateway:latest
    container_name: api-gateway
    depends_on:
      - api-gateway-db
    ports:
      - "8080:8080"

