services:
  user-service-db:
    image: postgres:16-alpine
    container_name: user-service-db
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432"

  user-service:
    image: edoc/user-service:latest
    container_name: user-service
    depends_on:
      - user-service-db
    ports:
      - "8088:8088"

