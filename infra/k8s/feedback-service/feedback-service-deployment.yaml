apiVersion: apps/v1
kind: Deployment
metadata:
  name: feedback-service
  namespace: edoc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: feedback-service
  template:
    metadata:
      labels:
        app: feedback-service
    spec:
      containers:
        - name: feedback-service
          image: edoc/feedback-service:latest
          ports:
            - containerPort: 8089
          env:
            - name: SERVER_PORT
              value: "8089"
            - name: DB_HOST
              value: "feedback-service-db"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "feedback_db"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: edoc-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: edoc-secrets
                  key: DB_PASSWORD
            - name: JWT_PUBLIC_KEY_PATH
              valueFrom:
                secretKeyRef:
                  name: edoc-secrets
                  key: JWT_PUBLIC_KEY_PATH
            - name: APPOINTMENT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: edoc-config
                  key: APPOINTMENT_SERVICE_URL
            - name: NOTIFICATION_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: edoc-config
                  key: NOTIFICATION_SERVICE_URL
            - name: USER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: edoc-config
                  key: USER_SERVICE_URL
          readinessProbe:
            tcpSocket:
              port: 8089
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8089
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: feedback-service
  namespace: edoc
spec:
  type: ClusterIP
  selector:
    app: feedback-service
  ports:
    - port: 8089
      targetPort: 8089

