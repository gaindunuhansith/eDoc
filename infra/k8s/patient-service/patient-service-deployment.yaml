apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-service
  namespace: edoc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: patient-service
  template:
    metadata:
      labels:
        app: patient-service
    spec:
      containers:
        - name: patient-service
          image: edoc/patient-service:latest
          ports:
            - containerPort: 8084
          env:
            - name: SERVER_PORT
              value: "8084"
            - name: DB_HOST
              value: "patient-service-db"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "patient_db"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: edoc-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: edoc-secrets
                  key: DB_PASSWORD
            - name: DOCTOR_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: edoc-config
                  key: DOCTOR_SERVICE_URL
            - name: JWT_PUBLIC_KEY_PATH
              valueFrom:
                secretKeyRef:
                  name: edoc-secrets
                  key: JWT_PUBLIC_KEY_PATH
            - name: REPORTS_DIR
              value: "/app/uploads/reports"
          readinessProbe:
            tcpSocket:
              port: 8084
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8084
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: patient-service
  namespace: edoc
spec:
  type: ClusterIP
  selector:
    app: patient-service
  ports:
    - port: 8084
      targetPort: 8084

