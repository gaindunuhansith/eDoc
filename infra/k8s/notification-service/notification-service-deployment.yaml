apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: edoc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: edoc/notification-service:latest
          ports:
            - containerPort: 8083
          env:
            - name: SERVER_PORT
              value: "8083"
            - name: DB_HOST
              value: "notification-service-db"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "notification_db"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: edoc-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: edoc-secrets
                  key: DB_PASSWORD
            - name: JWT_PUBLIC_KEY_PATH
              valueFrom:
                secretKeyRef:
                  name: edoc-secrets
                  key: JWT_PUBLIC_KEY_PATH
            - name: DOCTOR_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: edoc-config
                  key: DOCTOR_SERVICE_URL
            - name: PATIENT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: edoc-config
                  key: PATIENT_SERVICE_URL
            - name: USER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: edoc-config
                  key: USER_SERVICE_URL
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: edoc-secrets
                  key: RESEND_API_KEY
            - name: VONAGE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: edoc-secrets
                  key: VONAGE_API_KEY
            - name: VONAGE_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: edoc-secrets
                  key: VONAGE_API_SECRET
          readinessProbe:
            tcpSocket:
              port: 8083
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: edoc
spec:
  type: ClusterIP
  selector:
    app: notification-service
  ports:
    - port: 8083
      targetPort: 8083

