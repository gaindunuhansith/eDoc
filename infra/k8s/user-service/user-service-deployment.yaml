apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: edoc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: edoc/user-service:latest
          ports:
            - containerPort: 8088
          env:
            - name: SERVER_PORT
              value: "8088"
            - name: DB_HOST
              value: "user-service-db"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "user_db"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: edoc-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: edoc-secrets
                  key: DB_PASSWORD
            - name: JWT_PRIVATE_KEY_PATH
              valueFrom:
                secretKeyRef:
                  name: edoc-secrets
                  key: JWT_PRIVATE_KEY_PATH
            - name: JWT_PUBLIC_KEY_PATH
              valueFrom:
                secretKeyRef:
                  name: edoc-secrets
                  key: JWT_PUBLIC_KEY_PATH
            - name: PATIENT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: edoc-config
                  key: PATIENT_SERVICE_URL
            - name: DOCTOR_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: edoc-config
                  key: DOCTOR_SERVICE_URL
          readinessProbe:
            tcpSocket:
              port: 8088
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8088
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: edoc
spec:
  type: ClusterIP
  selector:
    app: user-service
  ports:
    - port: 8088
      targetPort: 8088

