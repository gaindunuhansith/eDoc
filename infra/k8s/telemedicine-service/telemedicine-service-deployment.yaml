apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemedicine-service
  namespace: edoc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telemedicine-service
  template:
    metadata:
      labels:
        app: telemedicine-service
    spec:
      containers:
        - name: telemedicine-service
          image: edoc/telemedicine-service:latest
          ports:
            - containerPort: 8086
          env:
            - name: SERVER_PORT
              value: "8086"
            - name: DB_HOST
              value: "telemedicine-service-db"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "telemedicine_db"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: edoc-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: edoc-secrets
                  key: DB_PASSWORD
            - name: APPOINTMENT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: edoc-config
                  key: APPOINTMENT_SERVICE_URL
            - name: NOTIFICATION_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: edoc-config
                  key: NOTIFICATION_SERVICE_URL
            - name: USER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: edoc-config
                  key: USER_SERVICE_URL
            - name: JWT_PUBLIC_KEY_PATH
              valueFrom:
                secretKeyRef:
                  name: edoc-secrets
                  key: JWT_PUBLIC_KEY_PATH
            - name: TWILIO_ACCOUNT_SID
              valueFrom:
                secretKeyRef:
                  name: edoc-secrets
                  key: TWILIO_ACCOUNT_SID
            - name: TWILIO_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: edoc-secrets
                  key: TWILIO_AUTH_TOKEN
            - name: TWILIO_API_KEY_SID
              valueFrom:
                secretKeyRef:
                  name: edoc-secrets
                  key: TWILIO_API_KEY_SID
            - name: TWILIO_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: edoc-secrets
                  key: TWILIO_API_SECRET
          readinessProbe:
            tcpSocket:
              port: 8086
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8086
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: telemedicine-service
  namespace: edoc
spec:
  type: ClusterIP
  selector:
    app: telemedicine-service
  ports:
    - port: 8086
      targetPort: 8086

