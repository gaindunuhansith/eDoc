apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: edoc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: edoc/api-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: SERVER_PORT
              value: "8080"
            - name: USER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: edoc-config
                  key: USER_SERVICE_URL
            - name: PATIENT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: edoc-config
                  key: PATIENT_SERVICE_URL
            - name: DOCTOR_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: edoc-config
                  key: DOCTOR_SERVICE_URL
            - name: APPOINTMENT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: edoc-config
                  key: APPOINTMENT_SERVICE_URL
            - name: PAYMENT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: edoc-config
                  key: PAYMENT_SERVICE_URL
            - name: NOTIFICATION_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: edoc-config
                  key: NOTIFICATION_SERVICE_URL
            - name: TELEMEDICINE_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: edoc-config
                  key: TELEMEDICINE_SERVICE_URL
            - name: FEEDBACK_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: edoc-config
                  key: FEEDBACK_SERVICE_URL
            - name: AI_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: edoc-config
                  key: AI_SERVICE_URL
            - name: CORS_ALLOWED_ORIGIN_1
              valueFrom:
                configMapKeyRef:
                  name: edoc-config
                  key: CORS_ALLOWED_ORIGIN_1
            - name: CORS_ALLOWED_ORIGIN_2
              valueFrom:
                configMapKeyRef:
                  name: edoc-config
                  key: CORS_ALLOWED_ORIGIN_2
            - name: JWT_PUBLIC_KEY_PATH
              valueFrom:
                secretKeyRef:
                  name: edoc-secrets
                  key: JWT_PUBLIC_KEY_PATH
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: edoc
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080

