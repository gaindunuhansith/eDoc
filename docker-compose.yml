services:
  payment-db:
    image: postgres:16-alpine
    container_name: payment-db
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      PGDATA: /data/postgres
    ports:
      - "5437:5432"
    volumes:
      - payment-db-data:/data/postgres
  patient-db:
    image: postgres:16-alpine
    container_name: patient-db
    environment:
      POSTGRES_DB: patient_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      PGDATA: /data/postgres
    ports:
      - "5436:5432"
    volumes:
      - patient-db-data:/data/postgres
  notification-db:
    image: postgres:16-alpine
    container_name: notification-db
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      PGDATA: /data/postgres
    ports:
      - "5435:5432"
    volumes:
      - notification-db-data:/data/postgres
  telemedicine-db:
    image: postgres:16-alpine
    container_name: telemedicine-db
    environment:
      POSTGRES_DB: telemedicine_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      PGDATA: /data/postgres
    ports:
      - "5438:5432"
    volumes:
      - telemedicine-db-data:/data/postgres
  feedback-db:
    image: postgres:16-alpine
    container_name: feedback-db
    environment:
      POSTGRES_DB: feedback_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      PGDATA: /data/postgres
    ports:
      - "5441:5432"
    volumes:
      - feedback-db-data:/data/postgres
  
user-db:
    image: postgres:16-alpine
    container_name: user-db
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      PGDATA: /data/postgres
    ports:
      - "5438:5432"
    volumes:
      - user-db-data:/data/postgres
  
volumes:
  payment-db-data:
  patient-db-data:
  notification-db-data:
  telemedicine-db-data:
  feedback-db-data:
  user-db-data:

