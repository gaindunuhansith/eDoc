apiVersion: v1
kind: Namespace
metadata:
  name: edoc
---
apiVersion: v1
kind: Secret
metadata:
  name: edoc-secrets
  namespace: edoc
type: Opaque
stringData:
  DB_USER: user
  DB_PASSWORD: password
  JWT_PRIVATE_KEY_PATH: /app/secrets/private.pem
  JWT_PUBLIC_KEY_PATH: /app/secrets/public.pem
  GROQ_API_KEY: ""
  PAYHERE_MERCHANT_ID: your_merchant_id
  PAYHERE_MERCHANT_SECRET: your_merchant_secret
  RESEND_API_KEY: ""
  VONAGE_API_KEY: ""
  VONAGE_API_SECRET: ""
  TWILIO_ACCOUNT_SID: ""
  TWILIO_AUTH_TOKEN: ""
  TWILIO_API_KEY_SID: ""
  TWILIO_API_SECRET: ""
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: edoc-config
  namespace: edoc
data:
  USER_SERVICE_URL: http://user-service:8088
  PATIENT_SERVICE_URL: http://patient-service:8084
  DOCTOR_SERVICE_URL: http://doctor-service:8082
  APPOINTMENT_SERVICE_URL: http://appointment-service:8081
  PAYMENT_SERVICE_URL: http://payment-service:8085
  NOTIFICATION_SERVICE_URL: http://notification-service:8083
  TELEMEDICINE_SERVICE_URL: http://telemedicine-service:8086
  FEEDBACK_SERVICE_URL: http://feedback-service:8089
  AI_SERVICE_URL: http://ai-service:8090
  APPOINTMENT_SERVICE_BASE_URL: http://appointment-service:8081
  NOTIFICATION_SERVICE_BASE_URL: http://notification-service:8083
  API_GATEWAY_ORIGIN: http://api-gateway:8080
  CORS_ALLOWED_ORIGIN_1: http://localhost:3000
  CORS_ALLOWED_ORIGIN_2: http://localhost:3001
  NEXT_PUBLIC_API_BASE_URL: http://api-gateway:8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-db
  namespace: edoc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-db
  template:
    metadata:
      labels:
        app: user-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: user_db
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: edoc-secrets
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: edoc-secrets
                  key: DB_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: user-db
  namespace: edoc
spec:
  selector:
    app: user-db
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
