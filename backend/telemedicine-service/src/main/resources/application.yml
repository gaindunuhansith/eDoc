spring:
  application:
    name: telemedicine-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5438}/${DB_NAME:telemedicine_db}
    username: ${DB_USER:user}
    password: ${DB_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true

server:
  port: ${SERVER_PORT:8086}

telemedicine:
  video-provider: twilio
  twilio:
    account-sid: ${TWILIO_ACCOUNT_SID:}
    auth-token: ${TWILIO_AUTH_TOKEN:}
    api-key-sid: ${TWILIO_API_KEY_SID:}
    api-secret: ${TWILIO_API_SECRET:}

# Service URLs for inter-service communication
appointment:
  service:
    url: ${APPOINTMENT_SERVICE_URL:http://appointment-service:8081}
notification:
  service:
    url: ${NOTIFICATION_SERVICE_URL:http://notification-service:8083}
user:
  service:
    url: ${USER_SERVICE_URL:http://user-service:8088}

jwt:
  public-key-path: ${JWT_PUBLIC_KEY_PATH:secrets/public.pem}

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
  h2:
    console:
      enabled: true
