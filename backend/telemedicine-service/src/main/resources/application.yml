server:
  port: 8086

spring:
  application:
    name: telemedicine-service
  datasource:
    url: jdbc:postgresql://localhost:5438/telemedicine_db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

telemedicine:
  video-provider: twilio
  twilio:
    account-sid: 
    auth-token: 
    api-key: 
    api-secret: 
