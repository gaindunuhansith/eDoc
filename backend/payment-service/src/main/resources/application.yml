spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5437}/${DB_NAME:payment_db}
    username: ${DB_USER:user}
    password: ${DB_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

payhere:
  merchant-id: ${PAYHERE_MERCHANT_ID:your_merchant_id}
  merchant-secret: ${PAYHERE_MERCHANT_SECRET:your_merchant_secret}
  checkout-url: ${PAYHERE_CHECKOUT_URL:https://sandbox.payhere.lk/pay/checkout}
  return-url: ${PAYHERE_RETURN_URL:http://localhost:3000/payment/success}
  cancel-url: ${PAYHERE_CANCEL_URL:http://localhost:3000/payment/cancel}
  notify-url: ${PAYHERE_NOTIFY_URL:http://localhost:8085/payments/notify}
  sandbox: ${PAYHERE_SANDBOX:true}

server:
  port: ${SERVER_PORT:8085}
