spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      httpclient:
        connect-timeout: 3000
        response-timeout: 10s
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - http://localhost:3000
              - http://localhost:3001
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - '*'
            exposedHeaders:
              - X-Correlation-Id
            allowCredentials: true
            maxAge: 3600
      routes:
        - id: user-service-users
          uri: http://localhost:8088
          predicates:
            - Path=/api/v1/users/**
          filters:
            - name: Retry
              args:
                retries: 2
                methods: GET
                statuses: BAD_GATEWAY,GATEWAY_TIMEOUT,SERVICE_UNAVAILABLE
        - id: user-service-admin
          uri: http://localhost:8088
          predicates:
            - Path=/api/v1/admin/**
          filters:
            - name: Retry
              args:
                retries: 2
                methods: GET
                statuses: BAD_GATEWAY,GATEWAY_TIMEOUT,SERVICE_UNAVAILABLE

        - id: patient-service
          uri: http://localhost:8084
          predicates:
            - Path=/patients/**
          filters:
            - name: Retry
              args:
                retries: 2
                methods: GET
                statuses: BAD_GATEWAY,GATEWAY_TIMEOUT,SERVICE_UNAVAILABLE

        - id: doctor-service-doctors
          uri: http://localhost:8082
          predicates:
            - Path=/api/doctors/**
          filters:
            - name: Retry
              args:
                retries: 2
                methods: GET
                statuses: BAD_GATEWAY,GATEWAY_TIMEOUT,SERVICE_UNAVAILABLE
        - id: doctor-service-prescriptions
          uri: http://localhost:8082
          predicates:
            - Path=/api/prescriptions/**
          filters:
            - name: Retry
              args:
                retries: 2
                methods: GET
                statuses: BAD_GATEWAY,GATEWAY_TIMEOUT,SERVICE_UNAVAILABLE

        - id: appointment-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/appointments/**
          filters:
            - name: Retry
              args:
                retries: 2
                methods: GET
                statuses: BAD_GATEWAY,GATEWAY_TIMEOUT,SERVICE_UNAVAILABLE

        - id: payment-service
          uri: http://localhost:8085
          predicates:
            - Path=/payments/**
          filters:
            - name: Retry
              args:
                retries: 2
                methods: GET
                statuses: BAD_GATEWAY,GATEWAY_TIMEOUT,SERVICE_UNAVAILABLE

        - id: notification-service
          uri: http://localhost:8083
          predicates:
            - Path=/notifications/**
          filters:
            - name: Retry
              args:
                retries: 2
                methods: GET
                statuses: BAD_GATEWAY,GATEWAY_TIMEOUT,SERVICE_UNAVAILABLE

        - id: telemedicine-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/telemedicine/**
          filters:
            - name: Retry
              args:
                retries: 2
                methods: GET
                statuses: BAD_GATEWAY,GATEWAY_TIMEOUT,SERVICE_UNAVAILABLE

        - id: feedback-service
          uri: http://localhost:8089
          predicates:
            - Path=/api/feedback/**
          filters:
            - name: Retry
              args:
                retries: 2
                methods: GET
                statuses: BAD_GATEWAY,GATEWAY_TIMEOUT,SERVICE_UNAVAILABLE

server:
  port: 8080
  forward-headers-strategy: framework

gateway:
  rate-limit:
    enabled: true
    client-header: X-Forwarded-For
    cleanup-interval: 200
    idle-ttl-seconds: 1800
    defaults:
      replenish-rate: 20
      burst-capacity: 40
    auth:
      replenish-rate: 5
      burst-capacity: 10
    payments:
      replenish-rate: 3
      burst-capacity: 6

logging:
  level:
    org.springframework.cloud.gateway: INFO

jwt:
  public-key: ${JWT_PUBLIC_KEY:}
