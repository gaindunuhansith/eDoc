server:
  port: 8081

spring:
  application:
    name: appointment-service
  data:
    mongodb:
      uri: ${MONGO_URI}
      database: edoc_appointment_db

jwt:
  secret: ${JWT_SECRET:change-this-default-jwt-secret-key-to-at-least-32-bytes}
  expiration: 86400000

doctor:
  service:
    url: http://localhost:8082

patient:
  service:
    url: http://localhost:8084

notification:
  service:
    url: http://localhost:8083

logging:
  level:
    com.edoc: DEBUG