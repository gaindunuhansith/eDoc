spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5440}/${DB_NAME:user_db}
    username: ${DB_USER:user}
    password: ${DB_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET:change-this-default-jwt-secret-key-to-at-least-32-bytes}
  expiration: ${JWT_EXPIRATION:86400000}

microservices:
  patient:
    base-url: ${PATIENT_SERVICE_URL:http://localhost:8084}
    delete-by-user-id-path: ${PATIENT_DELETE_BY_USER_ID_PATH:/patients/{userId}}
  doctor:
    base-url: ${DOCTOR_SERVICE_URL:http://localhost:8082}
    delete-by-user-id-path: ${DOCTOR_DELETE_BY_USER_ID_PATH:/api/doctors/{userId}}

server:
  port: ${SERVER_PORT:8088}
