spring:
  application:
    name: patient-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5436}/${DB_NAME:patient_db}
    username: ${DB_USER:user}
    password: ${DB_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

server:
  port: ${SERVER_PORT:8084}

app:
  storage:
    reports-dir: ${REPORTS_DIR:uploads/reports}

doctor-service:
  base-url: ${DOCTOR_SERVICE_URL:http://localhost:8082}

jwt:
  secret: ${JWT_SECRET:change-this-default-jwt-secret-key-to-at-least-32-bytes}
