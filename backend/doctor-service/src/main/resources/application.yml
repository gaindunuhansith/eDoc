server:
  port: 8082

spring:
  application:
    name: doctor-service
  data:
    mongodb:
      uri: ${MONGO_URI}
      database: edoc_doctor_db

jwt:
  secret: ${JWT_SECRET:change-this-default-jwt-secret-key-to-at-least-32-bytes}
  expiration: 86400000

patient:
  service:
    url: http://localhost:8084

logging:
  level:
    com.edoc: DEBUG