# Server port - doctor service runs on 8082
server.port=8082

# Application name
spring.application.name=doctor-service

# MongoDB connection
spring.data.mongodb.uri=mongodb://localhost:27017/edoc_doctor_db
spring.data.mongodb.database=edoc_doctor_db

# JWT Secret key (must be same across ALL services in your team)
jwt.secret=eDocSecretKey2026SuperSecureKeyForJWTTokenGeneration
jwt.expiration=86400000

# Logging
logging.level.com.edoc=DEBUG